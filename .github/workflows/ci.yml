name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  backend-lint:
    runs-on: ubuntu-latest
    # Bloqueante: baseline do deno lint zerada na Onda 5 (plans/009). Mantenha em 0.
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno lint --config supabase/functions/deno.json
      # Bloqueante: deno check zerado (plans/020). Mantenha em 0.
      - run: deno check --config supabase/functions/deno.json $(git ls-files 'supabase/functions/**/*.ts' | grep -v __tests__)
